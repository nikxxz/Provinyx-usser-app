import java.nio.file.Paths

def config = project.hasProperty("react") ? project.react : [:];
def nodeModulesDir = config.nodeModulesPath ?: "${rootDir}/../node_modules"

task copyFonts(type: Copy) {
    description = "Copy vector icon fonts to Android assets"
    from "${nodeModulesDir}/react-native-vector-icons/Fonts"
    into "${buildDir}/intermediates/assets/debug"
    include "*.ttf"
}

task copyFontsRelease(type: Copy) {
    description = "Copy vector icon fonts to Android assets (Release)"
    from "${nodeModulesDir}/react-native-vector-icons/Fonts"
    into "${buildDir}/intermediates/assets/release"
    include "*.ttf"
}

android {
    sourceSets {
        main {
            assets.srcDirs += "${nodeModulesDir}/react-native-vector-icons/Fonts"
        }
    }
}
